canisters:
  - name: backend
    build:
      steps:
        - type: script
          commands:
            - make backend
            - cp build/backend.wasm "$ICP_WASM_OUTPUT_PATH"
  - name: frontend
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        dir: dist
        build:
          - make frontend
