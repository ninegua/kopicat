name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: kopicat
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Cache vessel dependencies
        uses: actions/cache@v4
        with:
          path: .vessel
          key: vessel-${{ hashFiles('vessel.dhall', 'package-set.dhall') }}
          restore-keys: |
            vessel-

      - name: Build and test
        run: nix-build
