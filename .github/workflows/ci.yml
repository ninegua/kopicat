name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Cachix
        uses: cachix/cache-action@v17
        with:
          name: readonly

      - name: Cache vessel dependencies
        uses: actions/cache@v4
        with:
          path: .vessel
          key: vessel-${{ hashFiles('vessel.dhall', 'package-set.dhall') }}
          restore-keys: |
            vessel-

      - name: Build and test with nix-shell
        run: |
          echo "=== Building backend ==="
          nix-shell --run "make backend"

          echo "=== Building frontend ==="
          nix-shell --run "pnpm run build"

          echo "=== Running type checks ==="
          nix-shell --run "pnpm run check"

          echo "=== Running tests ==="
          nix-shell --run "pnpm run test"

      - name: Show test results on failure
        if: failure()
        run: |
          echo "=== Last 100 lines of output ==="
          # Tests run in CI, check if any output was captured
          echo "Check the job logs above for test output"
